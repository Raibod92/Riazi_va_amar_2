<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>پایان زمان آزمون</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 20%, #1a1f30, #0b0e17);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
            margin: 0;
        }

        .card {
            max-width: 620px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 60px;
            padding: 3.5rem 2.5rem;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* جلوه نور پس‌زمینه */
        .card::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 70% 30%, rgba(255, 70, 70, 0.12), transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        .card > * {
            position: relative;
            z-index: 2;
        }

        /* آیکون ساعت شنی با افکت درخشان */
        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 130px;
            height: 130px;
            background: linear-gradient(145deg, #ff4d4d, #c92a2a);
            border-radius: 50%;
            margin-bottom: 2rem;
            box-shadow: 0 16px 40px rgba(255, 50, 50, 0.4), 0 0 0 8px rgba(255, 50, 50, 0.12);
            animation: float 3s ease-in-out infinite;
            transition: transform 0.2s;
        }

        .icon-wrapper i {
            font-size: 5rem;
            color: #fff;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        /* عنوان اصلی با گرادینت چشمنواز */
        .title {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }

        .title span {
            background: linear-gradient(135deg, #ffb3b3, #ff6b6b, #ff3b3b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(255, 60, 60, 0.2);
        }

        /* زیرنویس کوتاه و شفاف */
        .sub {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.5px;
            margin-top: 0.8rem;
            border-top: 1px dashed rgba(255, 255, 255, 0.06);
            padding-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .sub i {
            color: #ff6b6b;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.4; transform: scale(0.9); }
        }

        /* خط تزیینی زیر آیکون (اختیاری) */
        .divider {
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff6b6b, transparent);
            margin: 1.2rem auto 0;
            border-radius: 10px;
            opacity: 0.6;
        }

        /* واکنش‌گرایی */
        @media (max-width: 550px) {
            .card {
                padding: 2.2rem 1.2rem;
                border-radius: 40px;
            }
            .icon-wrapper {
                width: 100px;
                height: 100px;
            }
            .icon-wrapper i {
                font-size: 3.8rem;
            }
            .title {
                font-size: 2rem;
            }
            .sub {
                font-size: 0.95rem;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 380px) {
            .title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- آیکون -->
        <div class="icon-wrapper">
            <i class="fas fa-hourglass-end"></i>
        </div>

        <!-- عنوان اصلی -->
        <h1 class="title">
            <span>زمان آزمون به پایان رسید</span>
        </h1>

        <!-- یک زیرنویس مختصر (بدون اشاره به پشتیبان یا درخواست) -->
        <div class="sub">
            <i class="fas fa-circle"></i>
            <span>.همگی خسته نباشید</span>
            <i class="fas fa-circle"></i>
        </div>

        <!-- خط تزیینی -->
        <div class="divider"></div>
    </div>

</body>
</html>

let userAnswers = [];
let examLocked = false;
let currentStudentName = "";
let examCompleted = false;
let timeUp = false;

let currentQuestions = [];

// کلید ذخیره در localStorage
const STORAGE_KEY = "math_exam_karkheh";
const STARTED_KEY = "math_exam_karkheh_started_names";
const COMPLETED_KEY = "math_exam_karkheh_completed_names";

// تایمر
const EXAM_DURATION_MS = 40 * 60 * 1000;
let examStartTime = null;
let timerInterval = null;

function getNameList(key) {
const raw = localStorage.getItem(key);
if (!raw) return [];
try {
const arr = JSON.parse(raw);
return Array.isArray(arr) ? arr : [];
} catch (e) {
return [];
}
}

function addNameToList(key, name) {
const list = getNameList(key);
if (!list.includes(name)) {
list.push(name);
localStorage.setItem(key, JSON.stringify(list));
}
}

function saveToLocalStorage(studentName, completedFlag, answersArray) {
const data = {
student: studentName,
completed: completedFlag,
answers: answersArray,
timestamp: new Date().toISOString()
};
localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadFromLocalStorage() {
const raw = localStorage.getItem(STORAGE_KEY);
if (!raw) return null;
try {
return JSON.parse(raw);
} catch(e) { return null; }
}

function clearAttemptStorage() {
localStorage.removeItem(STORAGE_KEY);
}

function shuffleArray(arr) {
for (let i = arr.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[arr[i], arr[j]] = [arr[j], arr[i]];
}
return arr;
}

function prepareQuestionsForStudent() {
const copied = questionsData.map(q => ({
text: q.text,
options: q.options.slice(),
correct: q.correct
}));

shuffleArray(copied);

copied.forEach(q => {
const opts = q.options.map((opt, idx) => ({ opt, idx }));
shuffleArray(opts);
q.options = opts.map(o => o.opt);
q.correct = opts.findIndex(o => o.idx === q.correct);
});

return copied;
}

function formatTime(ms) {
const totalSeconds = Math.max(0, Math.floor(ms / 1000));
const m = Math.floor(totalSeconds / 60).toString().padStart(2, "0");
const s = (totalSeconds % 60).toString().padStart(2, "0");
return `${m}:${s}`;
}

function lockQuestionsByTime() {
timeUp = true;
examLocked = true;
document.querySelectorAll('input[type="radio"]').forEach(radio => radio.disabled = true);
const timerDisplay = document.getElementById('timerDisplay');
if (timerDisplay) timerDisplay.innerText = "پایان وقت";
alert("⏰ زمان آزمون به پایان رسید! دیگر امکان پاسخ‌دهی نیست و فقط می‌توانید ثبت کنید.");
}

function startTimer() {
examStartTime = Date.now();
const timerDisplay = document.getElementById('timerDisplay');
if (timerDisplay) timerDisplay.innerText = "20:00";
if (timerInterval) clearInterval(timerInterval);
timerInterval = setInterval(() => {
const elapsed = Date.now() - examStartTime;
const remaining = EXAM_DURATION_MS - elapsed;
if (remaining <= 0) {
clearInterval(timerInterval);
lockQuestionsByTime();
return;
}
if (timerDisplay) timerDisplay.innerText = formatTime(remaining);
}, 1000);
}

const qTextSpan = document.createElement('div');
qTextSpan.className = 'q-text';
qTextSpan.innerHTML = `📌 سوال ${qNumber} : ${q.text}`;
const optionsDiv = document.createElement('div');
optionsDiv.className = 'options';

q.options.forEach((opt, optIdx) => {
const optLabel = document.createElement('label');
optLabel.className = 'option';
const radio = document.createElement('input');
radio.type = 'radio';
radio.name = `q${idx}`;
radio.value = optIdx;
if (examCompleted || examLocked || timeUp) radio.disabled = true;
radio.addEventListener('change', (e) => {
if (examCompleted || timeUp) return;
userAnswers[idx] = parseInt(radio.value);
const allOpts = optLabel.parentElement.querySelectorAll('.option');
allOpts.forEach(op => op.classList.remove('selected'));
optLabel.classList.add('selected');
const cardDiv = document.getElementById(`qCard_${idx}`);
if(cardDiv) cardDiv.classList.remove('correct-highlight');
const tempData = {
student: currentStudentName,
completed: false,
answers: userAnswers.slice(),
timestamp: new Date().toISOString()
};
localStorage.setItem(STORAGE_KEY, JSON.stringify(tempData));
});
if(userAnswers[idx] === optIdx && !examCompleted) {
radio.checked = true;
optLabel.classList.add('selected');
}
const spanText = document.createTextNode(` ${opt} `);
optLabel.appendChild(radio);
optLabel.appendChild(spanText);
optionsDiv.appendChild(optLabel);
});
qCard.appendChild(qTextSpan);
qCard.appendChild(optionsDiv);
container.appendChild(qCard);
});
}

// تصحیح و گلباران (نمایش نتیجه و ذخیره نهایی)
function evaluateAndFlower() {
if (examCompleted) {
alert("شما قبلاً در این آزمون شرکت کرده‌اید! امکان تصحیح مجدد وجود ندارد.");
return;
}
let allAnswered = true;
for(let i=0; i<userAnswers.length; i++) {
if(userAnswers[i] === null) allAnswered = false;
}
if(!allAnswered) {
if(!confirm("⚠️ برخی سوالات پاسخ داده نشده است. آیا مایل به ادامه تصحیح هستید؟ پاسخ‌های خالی نادرست محسوب می‌شوند.")) {
return;
}
}
let correctCount = 0;
let resultsDetail = [];
for(let i=0; i<currentQuestions.length; i++) {
const isCorrect = (userAnswers[i] !== null && userAnswers[i] === currentQuestions[i].correct);
if(isCorrect) correctCount++;
resultsDetail.push({
index: i,
isCorrect: isCorrect,
correctOptionIndex: currentQuestions[i].correct,
userSelected: userAnswers[i]
});
}
const totalScore = correctCount;
const percentScore = (correctCount / currentQuestions.length) * 100;

// نمایش نتیجه
const resultDiv = document.getElementById('resultArea');
resultDiv.style.display = 'block';
let flowerHtml = `<div style="font-size:1.5rem; font-weight:bold;">🌸🌼🌺 گلباران پاسخ‌های درست ${currentStudentName} جان 🌺🌸🌼</div>`;
flowerHtml += `<div class="score-board">✨ نمره: ${totalScore} از ${currentQuestions.length} ✨<br> (${correctCount} پاسخ صحیح از ${currentQuestions.length})</div>`;

if(correctCount === currentQuestions.length) {
flowerHtml += `<div style="background:#c8e6b5; border-radius: 48px; padding: 12px; margin: 10px 0;">🎉 آفرین ${currentStudentName}! پاسخ همه سوالات درست است 🎉 🌟🌟🌟</div>`;
} else if(correctCount >= currentQuestions.length-3) {
flowerHtml += `<div style="background:#e2f0ce; border-radius: 40px; padding: 8px;">💪 ${currentStudentName} عالی بود! کمی دقت بیشتر عالی می‌شوی 💪</div>`;
} else {
flowerHtml += `<div style="background:#ffeedd; border-radius: 40px; padding: 8px;">📚 ${currentStudentName} جان، با تمرین بیشتر به موفقیت می‌رسی، به پاسخ‌های درست دقت کن 🌷</div>`;
}

let flowerItems = [];
for(let i=0; i<currentQuestions.length; i++) {
if(resultsDetail[i].isCorrect) {
const flowersArr = ["🌸", "🌼", "🌻", "🌺", "🪷", "💐", "🌷"];
const fl = flowersArr[i % flowersArr.length];
flowerItems.push(`<div class="flower-item">${fl} سوال ${i+1} صحیح ${fl}</div>`);
} else {
const correctAnsText = currentQuestions[i].options[currentQuestions[i].correct];
flowerItems.push(`<div style="background:#ffe0db; border-radius: 36px; padding: 6px 12px; font-size:0.9rem;">❌ سوال ${i+1} | پاسخ صحیح: ${correctAnsText}</div>`);
}
}
flowerHtml += `<div class="flower-rain">${flowerItems.join('')}</div>`;
flowerHtml += `<hr><div style="font-size:0.9rem; text-align:right; background:#faf1df; border-radius: 32px; padding: 12px;"><strong>📖 پاسخنامه صحیح:</strong><br>`;
for(let i=0; i<currentQuestions.length; i++) {
const correctOpt = currentQuestions[i].options[currentQuestions[i].correct];
flowerHtml += `سوال ${i+1} : ${correctOpt} &nbsp;&nbsp; `;
if(resultsDetail[i].isCorrect) flowerHtml += `✓✔️  `;
else flowerHtml += ` ✘ `;
if((i+1)%2 === 0) flowerHtml += `<br>`;
}
flowerHtml += `</div><div style="margin-top: 20px; background: radial-gradient(circle, #fceab8, #fff1cf); padding: 14px; border-radius: 72px; font-size: 2rem; text-align: center;">🌸🌼🌸🌺🌷🌼🌸🌺</div>`;
resultDiv.innerHTML = flowerHtml;

// هایلایت کارت‌های درست
for(let i=0; i<currentQuestions.length; i++) {
const card = document.getElementById(`qCard_${i}`);
if(card) {
card.classList.remove('correct-highlight');
if(resultsDetail[i].isCorrect) {
card.classList.add('correct-highlight');
let mark = card.querySelector('.mini-flower-mark');
if(!mark) {
const markSpan = document.createElement('span');
markSpan.className = 'mini-flower-mark';
markSpan.style.float = 'left';
markSpan.style.fontSize = '1.3rem';
markSpan.innerHTML = ' 🌸';
card.appendChild(markSpan);
}
}
}
}
// قفل کردن آزمون و ذخیره نهایی
examCompleted = true;
examLocked = true;
document.querySelectorAll('input[type="radio"]').forEach(radio => radio.disabled = true);
saveToLocalStorage(currentStudentName, true, userAnswers);
addNameToList(COMPLETED_KEY, currentStudentName);
if (timerInterval) clearInterval(timerInterval);
window.removeEventListener('beforeunload', beforeUnloadHandler);
}

// شروع آزمون بعد از وارد کردن نام
function startExam(studentName) {
if(!studentName || studentName.trim() === "") {
const warn = document.getElementById('loginWarning');
warn.style.display = 'block';
warn.innerText = "⚠️ لطفاً نام و نام خانوادگی خود را وارد کنید!";
return false;
}

const normalizedName = studentName.trim();
const startedNames = getNameList(STARTED_KEY);
const completedNames = getNameList(COMPLETED_KEY);

if (startedNames.includes(normalizedName) || completedNames.includes(normalizedName)) {
document.getElementById('loginWarning').style.display = 'block';
document.getElementById('loginWarning').innerText = "⛔ شما قبلاً در این آزمون شرکت کرده‌اید و امکان تکرار وجود ندارد. ⛔";
return false;
}

addNameToList(STARTED_KEY, normalizedName);

document.getElementById('loginWarning').style.display = 'none';
currentStudentName = normalizedName;
document.getElementById('displayStudentNameSpan').innerText = currentStudentName;

currentQuestions = prepareQuestionsForStudent();
userAnswers = new Array(currentQuestions.length).fill(null);

renderQuestions();
document.getElementById('loginPanel').style.display = 'none';
document.getElementById('questionsSection').style.display = 'block';

saveToLocalStorage(currentStudentName, false, userAnswers);
examCompleted = false;
examLocked = false;
timeUp = false;

startTimer();

window.addEventListener('beforeunload', beforeUnloadHandler);
return true;
}

function beforeUnloadHandler(e) {
if (!examCompleted) {
e.preventDefault();
e.returnValue = "اگر خارج شوید، آزمون شما حذف می‌شود!";
return "اگر خارج شوید، آزمون شما حذف می‌شود!";
}
}

function handleExitCleanup() {
if (!examCompleted) {
clearAttemptStorage();
}
}

window.onload = () => {
const startBtn = document.getElementById('startExamBtn');
startBtn.addEventListener('click', () => {
const nameInput = document.getElementById('studentNameInput').value;
startExam(nameInput);
});
const submitBtn = document.getElementById('checkBtn');
if(submitBtn) {
submitBtn.addEventListener('click', evaluateAndFlower);
}
};

window.addEventListener('pagehide', handleExitCleanup);
window.addEventListener('unload', handleExitCleanup);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>آزمون ریاضی و آمار۲ نوبت دوم کلاس ۱۱ انسانی | دبیر: مریم علی اکبری</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(145deg, #e9f5e6 0%, #c8e6d9 100%);
  font-family: 'Vazirmatn', 'IRAN Sans', 'Segoe UI', Tahoma, sans-serif;
  padding: 30px 20px; color: #1e3c2c;
}
.exam-container {
  max-width: 1100px; margin: 0 auto; background: #fffef7;
  border-radius: 32px; box-shadow: 0 20px 40px rgba(0,30,0,0.2);
  overflow: hidden; border: 1px solid #cddca7;
}
.flower-border {
  background: #fdf8e7; padding: 12px 20px 8px; text-align: center;
  border-bottom: 2px solid #f3c26f; font-size: 1.2rem; letter-spacing: 2px;
  color: #b45f2a; font-weight: bold;
}
.dedication {
  background: #fef1cf; padding: 20px; text-align: center;
  border-bottom: 5px solid #d4af37;
  background-image: radial-gradient(circle at 10% 30%, rgba(255,215,150,0.2) 2%, transparent 2.5%);
  background-size: 28px 28px;
}
.dedication h2 { color: #8b3c1c; font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; text-shadow: 1px 1px 0 #ffe0a3; }
.dedication p { font-size: 1.2rem; color: #2c4722; font-weight: 500; }
.teacher-info {
  background: #e8f0e3; padding: 14px 20px; border-radius: 40px;
  margin: 15px 20px; display: flex; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; font-weight: bold;
  border-right: 8px solid #6f9e3f; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.login-screen { background: #fffef7; padding: 30px 25px 45px; text-align: center; }
.login-box {
  background: #f8fbe7; border-radius: 48px; padding: 30px 20px;
  max-width: 500px; margin: 20px auto; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  border: 1px solid #caddae;
}
.login-box label { font-size: 1.3rem; font-weight: bold; display: block; margin-bottom: 15px; }
#studentNameInput {
  width: 80%; padding: 12px 20px; font-size: 1.1rem;
  border-radius: 60px; border: 2px solid #b3cf99; text-align: center;
  font-family: inherit; margin-bottom: 20px;
}
.btn-start {
  background: #4c7a34; color: white; font-size: 1.2rem;
  padding: 10px 28px; border: none; border-radius: 40px;
  cursor: pointer; font-weight: bold;
}
.warning-msg {
  color: #c0392b; background: #ffe6e5; border-radius: 32px;
  padding: 8px; margin-top: 12px; font-size: 0.9rem;
}
.questions-section { display: none; }
.student-row {
  background: white; margin: 20px 25px; padding: 12px 18px;
  border-radius: 28px; border: 1px solid #bdd99b;
  display: flex; align-items: baseline; flex-wrap: wrap;
  gap: 10px; font-size: 1.1rem;
}
.question-card {
  background: #ffffffd9; margin: 22px 0; border-radius: 28px;
  padding: 18px 20px; border: 1px solid #cbe4b4;
  transition: all 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.03);
}
.q-text {
  font-size: 1.1rem; font-weight: 600; margin-bottom: 15px;
  background: #f6fbed; padding: 8px 15px; border-radius: 40px;
  display: inline-block;
}
.options {
  display: flex; flex-wrap: wrap; gap: 20px;
  margin-top: 12px; margin-right: 15px;
}
.option {
  display: flex; align-items: center; gap: 8px;
  background: #fafef5; padding: 6px 18px; border-radius: 60px;
  border: 1px solid #cfe2bd; cursor: pointer; transition: 0.1s;
}
.option.selected {
  background: #cbe6b0; border-color: #6f9e3f;
  box-shadow: 0 2px 5px rgba(105,150,40,0.3);
}
input[type="radio"] { accent-color: #548c2f; width: 18px; height: 18px; margin-left: 5px; cursor: pointer; }
.submit-area { text-align: center; margin: 20px 0 25px; }
.btn-submit {
  background: #4c7a34; color: white; font-size: 1.3rem; font-weight: bold;
  padding: 12px 32px; border: none; border-radius: 48px; cursor: pointer;
  transition: 0.2s; box-shadow: 0 5px 0 #2c4d1c; font-family: inherit;
}
.flower-result {
  background: #fffaf0; border-radius: 48px; margin: 15px 25px 30px;
  padding: 20px; text-align: center; border: 2px dashed #ffbd71;
  transition: all 0.5s ease;
}
.score-board {
  font-size: 1.8rem; font-weight: bold; color: #dc7f2c;
  background: #fff0db; display: inline-block; padding: 10px 25px;
  border-radius: 60px; margin: 10px 0;
}
.flower-rain {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 18px;
  margin-top: 20px; padding: 15px; background: rgba(255,245,210,0.7);
  border-radius: 64px;
}
.flower-item {
  background: #ffe2a4; border-radius: 100px; padding: 8px 16px;
  font-size: 1.4rem; display: inline-flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1); animation: softPop 0.3s ease;
}
@keyframes softPop {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.correct-highlight { background: #eaffdd; border-right: 8px solid #ffbc6e; }
footer {
  text-align: center; font-size: 0.8rem; padding: 18px;
  background: #dedfc7; color: #3b5c2a; border-top: 1px solid #c2d9aa;
}
@media (max-width: 650px) { .options { flex-direction: column; gap: 10px; } }
</style>
</head>
<body>
<div class="exam-container">
  <div class="flower-border">
    <span>🌸</span> <span>🌼</span> <span>🌻</span> آزمون ریاضی و آمار۲ <span>🌷</span> <span>🌸</span> <span>🌺</span>
  </div>
  <div class="dedication">
    <div style="font-size: 2rem;">🌸🕊️🌸</div>
  </div>
  <div class="teacher-info">
    <span>✏️ طراح آزمون: مریم علی اکبری</span>
    <span>🏫 دبیر دبیرستان ۱۵ خرداد</span>
    <span>📍 شهرستان بجنورد</span>
  </div>

  <div id="loginPanel" class="login-screen">
    <div class="login-box">
      <label>📝 ثبت نام و شروع آزمون</label>
      <input type="text" id="studentNameInput" placeholder="نام و نام خانوادگی خود را وارد کنید" autocomplete="off">
      <button id="startExamBtn" class="btn-start">🚪 ورود به صفحه سوالات 🚪</button>
      <div id="loginWarning" class="warning-msg" style="display: none;"></div>
      <div style="margin-top: 20px; font-size:0.8rem;">* پس از ثبت نام، امکان شرکت مجدد وجود ندارد.</div>
    </div>
  </div>

  <div id="questionsSection" class="questions-section">
    <div class="student-row">
      <label>👤 دانش‌آموز:</label>
      <span id="displayStudentNameSpan" style="font-weight:bold; background:#e1f0d3; padding:5px 15px; border-radius:30px;"></span>
    </div>
    <div class="questions-area" style="padding: 10px 25px 20px;">
      <div style="background:#f2f8ea; border-radius: 40px; padding: 8px 15px; margin-bottom: 15px;">
        <span>⏳ مدت: ۴۰ دقیقه | ⏱️ زمان باقی‌مانده: <strong id="timerDisplay">40:00</strong> | 📊 هر سوال ۱ نمره | سوالات از کتاب ریاضی و آمار ۲</span>
      </div>
      <div id="questionsContainer"></div>
      <div class="submit-area">
        <button class="btn-submit" id="checkBtn">✨ تصحیح آزمون و گلباران ✨</button>
      </div>
      <div id="resultArea" class="flower-result" style="display: none;"></div>
    </div>
  </div>

  <footer>🌸 موفق و پیروز باشید | با دقت پاسخ دهید 🌸</footer>
</div>

<script>
const questionsData = [
  { text: 'نقیض گزاره «۷ عددی اول است» کدام است؟', options: ['۷ عددی اول است', '۷ عددی مرکب است', '۷ عددی اول نیست', '۷ از ۱ بزرگ‌تر است'], correct: 2 },
  { text: 'ارزش گزاره «2+2=5 یا 3>1» چیست؟', options: ['نادرست', 'درست', 'هم درست هم نادرست', 'قابل تعیین نیست'], correct: 1 },
  { text: 'اگر در گزاره شرطی، مقدم درست و تالی نادرست باشد، ارزش گزاره چیست؟', options: ['درست', 'نادرست', 'هم‌ارز', 'نامشخص'], correct: 1 },  { text: 'نقیض گزاره «همه دانش‌آموزان باهوش‌اند» کدام است؟', options: ['هیچ دانش‌آموزی باهوش نیست', 'بعضی دانش‌آموزان باهوش‌اند', 'حداقل یک دانش‌آموز باهوش نیست', 'همه دانش‌آموزان باهوش نیستند'], correct: 2 },
  { text: 'اگر p و q هر دو نادرست باشند، ارزش گزاره p↔q چیست؟', options: ['درست', 'نادرست', 'نامشخص', 'هیچ‌کدام'], correct: 0 },
  { text: 'کدام استدلال معتبر است؟', options: [
      'اگر درس بخوانم، موفق می‌شوم. درس خوانده‌ام، پس موفق می‌شوم.',
      'اگر باران ببارد، زمین خیس می‌شود. زمین خیس است، پس باران باریده است.',
      'اگر هوا سرد باشد، برف می‌بارد. هوا سرد است، پس برف می‌بارد.',
      'اگر عددی زوج باشد، بر ۲ بخش‌پذیر است. عددی بر ۲ بخش‌پذیر است، پس زوج است.'
    ], correct: 0 },
  { text: 'گزاره «عدد ۵ زوج است» از نظر منطقی چگونه است؟', options: ['درست', 'نادرست', 'هم درست هم نادرست', 'گزاره نیست'], correct: 1 },
  { text: 'اگر تابعی به هر ورودی مقدار ۴ را نسبت دهد، این تابع چه نام دارد؟', options: ['همانی', 'ثابت', 'چندضابطه‌ای', 'پلکانی'], correct: 1 },
  { text: 'دامنه تابع همانی f(x)=x در حالت معمول چیست؟', options: ['فقط اعداد طبیعی', 'فقط اعداد صحیح', 'همه اعداد حقیقی', 'فقط اعداد گویا'], correct: 2 },
  { text: 'نمودار تابع ثابت f(x)=c چه شکلی است؟', options: ['خط عمودی', 'خط افقی', 'سهمی', 'خط مورب'], correct: 1 },
  { text: 'آیا تابع همانی از نقطه (2,2) می‌گذرد؟', options: ['بله', 'خیر', 'فقط اگر ۲ مثبت باشد', 'فقط اگر ۲ منفی باشد'], correct: 0 },
  { text: 'اگر f(x)=5، شیب نمودار این تابع چقدر است؟', options: ['5', '1', '0', 'تعریف‌نشده'], correct: 2 },
  { text: 'کدام مورد می‌تواند نمونه‌ای از تابع چندضابطه‌ای باشد؟', options: [
      'تابعی که در بازه‌های مختلف تعریف‌های متفاوت دارد',
      'تابعی که همیشه مقدار ثابتی می‌دهد',
      'تابعی که f(x)=x است',
      'تابعی که فقط برای x=0 تعریف شده است'
    ], correct: 0 },
  { text: 'اگر f(x)=x، مقدار f(π) چیست؟', options: ['0', '1', 'π', '2π'], correct: 2 },
  { text: 'مقدار [2.7] در تابع جزءصحیح برابر است با:', options: ['3', '2', '2.7', '1'], correct: 1 },
  { text: 'مقدار [−1.5] در تابع جزءصحیح برابر است با:', options: ['−1', '−2', '0', '1'], correct: 1 },
  { text: 'آیا خروجی تابع قدرمطلقی می‌تواند منفی باشد؟', options: ['بله', 'خیر', 'فقط برای x<0', 'فقط برای x>0'], correct: 1 },
  { text: 'نما در مجموعه داده‌های 2، 3، 3، 5، 7 برابر است با:', options: ['2', '3', '5', '7'], correct: 1 },
  { text: 'میانه‌ی داده‌های 1، 3، 5، 7، 9 کدام است؟', options: ['3', '4', '5', '7'], correct: 2 },
  { text: 'میانگین داده‌های 2، 4، 6، 8 برابر است با:', options: ['4', '5', '6', '7'], correct: 1 },
  { text: 'اگر به همه داده‌ها عدد 2 اضافه کنیم، میانگین چه می‌شود؟', options: ['2 واحد کم می‌شود', '2 واحد زیاد می‌شود', 'ثابت می‌ماند', 'دو برابر می‌شود'], correct: 1 },
  { text: 'برای داده‌های کیفی مانند رنگ چشم، کدام شاخص مناسب‌تر است؟', options: ['میانگین', 'میانه', 'نما', 'دامنه'], correct: 2 },
  { text: 'در سری زمانی، داده‌ها چگونه مرتب می‌شوند؟', options: ['بر اساس مقدار', 'بر اساس فراوانی', 'بر اساس زمان', 'بر اساس بزرگی و کوچکی'], correct: 2 },
  { text: 'درون‌یابی یعنی:', options: ['تخمین مقدار داخل محدوده داده‌ها', 'تخمین مقدار خارج از محدوده داده‌ها', 'حذف داده‌های پرت', 'محاسبه میانه'], correct: 0 },
  { text: 'داده پرت به داده‌ای گفته می‌شود که:', options: ['نزدیک به سایر داده‌هاست', 'خیلی از بقیه فاصله دارد', 'همیشه صفر است', 'حتماً برابر با میانگین است'], correct: 1 }
];

let userAnswers = [];
let examLocked = false;
let currentStudentName = "";
let examCompleted = false;
let timeUp = false;
let currentQuestions = [];

const STORAGE_KEY = "math_exam_karkheh";
const STARTED_KEY = "math_exam_karkheh_started_names";
const COMPLETED_KEY = "math_exam_karkheh_completed_names";
const EXAM_DURATION_MS = 40 * 60 * 1000;
let examStartTime = null;
let timerInterval = null;

function getNameList(key) {
  const raw = localStorage.getItem(key);
  if (!raw) return [];
  try {
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}

function addNameToList(key, name) {
  const list = getNameList(key);
  if (!list.includes(name)) {
    list.push(name);
    localStorage.setItem(key, JSON.stringify(list));
  }
}

function saveToLocalStorage(studentName, completedFlag, answersArray) {
  const data = {
    student: studentName,
    completed: completedFlag,
    answers: answersArray,
    timestamp: new Date().toISOString()
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function clearAttemptStorage() {
  localStorage.removeItem(STORAGE_KEY);
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// رفع مشکل جابجایی علامت‌های ریاضی در متن راست‌به‌چپ
function fixMathText(text) {
  // هر دنباله از کاراکترهای لاتین، اعداد، علامت‌های ریاضی، منها، قدرمطلق و ...
  return text.replace(/([A-Za-z0-9\u2212\u2223+\-=\/(){}\[\].,π≥≤≠±]+)/g, '<span dir="ltr">$1</span>');
}

function prepareQuestionsForStudent() {
  const copied = questionsData.map(q => ({
    text: q.text,
    options: q.options.slice(),
    correct: q.correct
  }));

  shuffleArray(copied);                 // کل ۳۲ سوال به هم می‌ریزد
  const selected = copied.slice(0, 16); // ۱۶ تای اول (تصادفی) را برمی‌دارد

  selected.forEach(q => {
    const opts = q.options.map((opt, idx) => ({ opt, idx }));
    shuffleArray(opts);
    q.options = opts.map(o => o.opt);
    q.correct = opts.findIndex(o => o.idx === q.correct);
  });

  return selected;
}

function formatTime(ms) {
  const totalSeconds = Math.max(0, Math.floor(ms / 1000));
  const m = Math.floor(totalSeconds / 60).toString().padStart(2, "0");
  const s = (totalSeconds % 60).toString().padStart(2, "0");
  return `${m}:${s}`;
}

function lockQuestionsByTime() {
  timeUp = true;
  examLocked = true;
  document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
  document.getElementById('timerDisplay').innerText = "پایان وقت";
  alert("⏰ زمان آزمون به پایان رسید! دیگر امکان پاسخ‌دهی نیست.");
}

function startTimer() {
  examStartTime = Date.now();
  document.getElementById('timerDisplay').innerText = "40:00";
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const remaining = EXAM_DURATION_MS - (Date.now() - examStartTime);
    if (remaining <= 0) {
      clearInterval(timerInterval);
      lockQuestionsByTime();
      return;
    }
    document.getElementById('timerDisplay').innerText = formatTime(remaining);
  }, 1000);
}

function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  currentQuestions.forEach((q, idx) => {
    const qCard = document.createElement('div');
    qCard.className = 'question-card';
    qCard.id = `qCard_${idx}`;
    const qTextSpan = document.createElement('div');
    qTextSpan.className = 'q-text';
    qTextSpan.innerHTML = `📌 سوال ${idx+1} : ${fixMathText(q.text)}`;
    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'options';

    q.options.forEach((opt, optIdx) => {
      const label = document.createElement('label');
      label.className = 'option';
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = `q${idx}`;
      radio.value = optIdx;
      if (examCompleted || examLocked || timeUp) radio.disabled = true;
      radio.addEventListener('change', () => {
        if (examCompleted || timeUp) return;
        userAnswers[idx] = parseInt(radio.value);
        optionsDiv.querySelectorAll('.option').forEach(op => op.classList.remove('selected'));
        label.classList.add('selected');
        document.getElementById(`qCard_${idx}`).classList.remove('correct-highlight');
        saveToLocalStorage(currentStudentName, false, userAnswers);
      });
      if (userAnswers[idx] === optIdx && !examCompleted) {
        radio.checked = true;
        label.classList.add('selected');
      }
      const span = document.createElement('span');
      span.innerHTML = fixMathText(opt);   // <-- اصلاح نمایش گزینه‌ها
      label.appendChild(radio);
      label.appendChild(span);
      optionsDiv.appendChild(label);
    });

    qCard.appendChild(qTextSpan);
    qCard.appendChild(optionsDiv);
    container.appendChild(qCard);
  });
}

function evaluateAndFlower() {
  if (examCompleted) {
    alert("شما قبلاً آزمون را تصحیح کرده‌اید!");
    return;
  }
  const allAnswered = userAnswers.every(a => a !== null);
  if (!allAnswered && !confirm("برخی سوالات پاسخ داده نشده‌اند. ادامه می‌دهید؟ (خالی = نادرست)")) return;

  let correctCount = 0;
  const details = currentQuestions.map((q, i) => {
    const isCorrect = userAnswers[i] === q.correct;
    if (isCorrect) correctCount++;
    return { index: i, isCorrect, correctOptionIndex: q.correct, userSelected: userAnswers[i] };
  });

  const resultDiv = document.getElementById('resultArea');
  resultDiv.style.display = 'block';

  let html = `<div style="font-size:1.5rem; font-weight:bold;">🌸🌼🌺 گلباران پاسخ‌های درست ${currentStudentName} جان 🌺🌸🌼</div>`;
  html += `<div class="score-board">✨ نمره: ${correctCount} از ${currentQuestions.length} ✨<br> (${correctCount} پاسخ صحیح)</div>`;

  if (correctCount === currentQuestions.length) {
    html += `<div style="background:#c8e6b5; border-radius:48px; padding:12px;">🎉 آفرین ${currentStudentName}! همه پاسخ‌ها درست! 🌟🌟🌟</div>`;
  } else if (correctCount >= currentQuestions.length - 3) {
    html += `<div style="background:#e2f0ce; border-radius:40px; padding:8px;">💪 ${currentStudentName} عالی بود! کمی دقت بیشتر ...</div>`;
  } else {
    html += `<div style="background:#ffeedd; border-radius:40px; padding:8px;">📚 با تمرین بیشتر موفق می‌شوی 🌷</div>`;
  }

  let items = '';
  const flowers = ["🌸","🌼","🌻","🌺","🪷","💐","🌷"];
  details.forEach((d, i) => {
    if (d.isCorrect) {
      items += `<div class="flower-item">${flowers[i % flowers.length]} سوال ${i+1} صحیح</div>`;
    } else {
      items += `<div style="background:#ffe0db; border-radius:36px; padding:6px 12px; font-size:0.9rem;">❌ سوال ${i+1} | پاسخ صحیح: ${fixMathText(currentQuestions[i].options[d.correctOptionIndex])}</div>`;
    }
  });
  html += `<div class="flower-rain">${items}</div>`;

  html += `<hr><div style="font-size:0.9rem; background:#faf1df; border-radius:32px; padding:12px;"><strong>📖 پاسخنامه:</strong><br>`;
  currentQuestions.forEach((q, i) => {
    html += `سوال ${i+1}: ${fixMathText(q.options[q.correct])} `;
    html += details[i].isCorrect ? '✔️ ' : '✘ ';
    if ((i+1) % 2 === 0) html += '<br>';
  });
  html += `</div><div style="margin-top:20px; background:radial-gradient(circle,#fceab8,#fff1cf); padding:14px; border-radius:72px; font-size:2rem; text-align:center;">🌸🌼🌸🌺🌷🌼🌸🌺</div>`;
  resultDiv.innerHTML = html;

  // هایلایت
  details.forEach((d, i) => {
    const card = document.getElementById(`qCard_${i}`);
    if (card) {
      card.classList.remove('correct-highlight');
      if (d.isCorrect) {
        card.classList.add('correct-highlight');
        if (!card.querySelector('.mini-flower-mark')) {
          const mark = document.createElement('span');
          mark.className = 'mini-flower-mark';
          mark.style.cssFloat = 'left';
          mark.style.fontSize = '1.3rem';
          mark.innerHTML = '🌸';
          card.appendChild(mark);
        }
      }
    }
  });

  examCompleted = true;
  examLocked = true;
  document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
  saveToLocalStorage(currentStudentName, true, userAnswers);
  addNameToList(COMPLETED_KEY, currentStudentName);
  if (timerInterval) clearInterval(timerInterval);
  window.removeEventListener('beforeunload', beforeUnloadHandler);
}

function startExam(studentName) {
  if (!studentName.trim()) {
    document.getElementById('loginWarning').style.display = 'block';
    document.getElementById('loginWarning').innerText = "⚠️ لطفاً نام و نام خانوادگی را وارد کنید!";
    return false;
  }
  const name = studentName.trim();
  const started = getNameList(STARTED_KEY);
  const completed = getNameList(COMPLETED_KEY);
  if (started.includes(name) || completed.includes(name)) {
    document.getElementById('loginWarning').style.display = 'block';
    document.getElementById('loginWarning').innerText = "⛔ شما قبلاً در این آزمون شرکت کرده‌اید!";
    return false;
  }

  addNameToList(STARTED_KEY, name);
  document.getElementById('loginWarning').style.display = 'none';
  currentStudentName = name;
  document.getElementById('displayStudentNameSpan').innerText = name;

  currentQuestions = prepareQuestionsForStudent();
  userAnswers = new Array(currentQuestions.length).fill(null);
  renderQuestions();
  document.getElementById('loginPanel').style.display = 'none';
  document.getElementById('questionsSection').style.display = 'block';

  saveToLocalStorage(currentStudentName, false, userAnswers);
  examCompleted = false;
  examLocked = false;
  timeUp = false;
  startTimer();
  window.addEventListener('beforeunload', beforeUnloadHandler);
  return true;
}

function beforeUnloadHandler(e) {
  if (!examCompleted) {
    e.preventDefault();
    e.returnValue = "اگر خارج شوید، آزمون شما حذف می‌شود!";
    return e.returnValue;
  }
}

window.onload = () => {
  document.getElementById('startExamBtn').addEventListener('click', () => {
    startExam(document.getElementById('studentNameInput').value);
  });
  document.getElementById('checkBtn').addEventListener('click', evaluateAndFlower);
};

window.addEventListener('pagehide', () => { if (!examCompleted) clearAttemptStorage(); });
window.addEventListener('unload', () => { if (!examCompleted) clearAttemptStorage(); });
</script>
</body>
</html>
